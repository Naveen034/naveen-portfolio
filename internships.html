<!DOCTYPE html>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

nav{
background:#111;
padding:15px;
text-align:center;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#00ffff;
}

h1{
text-align:center;
margin-top:40px;
}

.intern-container{
max-width:800px;
margin:auto;
padding:40px;
display:flex;
flex-direction:column;
gap:30px;
}

.intern-card{
background:#141414;
padding:25px;
border-radius:15px;
border-left:4px solid cyan;
}

.cloud-bg{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 30% 30%,#1a1a2e,#000);
z-index:-1;
animation:cloudmove 30s linear infinite;
}

@keyframes cloudmove{
0%{background-position:0 0}
100%{background-position:1000px 500px}
}

.tech-icons{
text-align:center;
margin-top:40px;
}

.tech-icons img{
width:60px;
margin:20px;
animation:float 4s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

</style>
</head>
